services:
  app:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    container_name: llm-wiki-app
    working_dir: /workspace
    command: air -c .air.toml
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
      - opensearch
    environment:
      LLM_WIKI_ENVIRONMENT: development
      LLM_WIKI_LOG_LEVEL: debug
      LLM_WIKI_AUTO_MIGRATE: "true"
      LLM_WIKI_SERVER_HOST: 0.0.0.0
      LLM_WIKI_SERVER_PORT: 8234
      LLM_WIKI_CLI_BASE_URL: http://127.0.0.1:8234
      LLM_WIKI_CLI_TIMEOUT: 10s
      LLM_WIKI_POSTGRES_HOST: postgres
      LLM_WIKI_POSTGRES_PORT: 5432
      LLM_WIKI_POSTGRES_USER: llmwiki
      LLM_WIKI_POSTGRES_PASSWORD: llmwiki
      LLM_WIKI_POSTGRES_DATABASE: llmwiki
      LLM_WIKI_POSTGRES_SSLMODE: disable
      LLM_WIKI_REDIS_ADDR: redis:6379
      LLM_WIKI_REDIS_PASSWORD: ""
      LLM_WIKI_REDIS_DB: 0
      LLM_WIKI_MINIO_ENDPOINT: minio:9000
      LLM_WIKI_MINIO_ACCESS_KEY: minioadmin
      LLM_WIKI_MINIO_SECRET_KEY: minioadmin
      LLM_WIKI_MINIO_BUCKET: llm-wiki
      LLM_WIKI_MINIO_USE_SSL: "false"
      LLM_WIKI_OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "8234:8234"
    volumes:
      - ../..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  postgres:
    image: postgres:17
    container_name: llm-wiki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: llmwiki
      POSTGRES_USER: llmwiki
      POSTGRES_PASSWORD: llmwiki
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: llm-wiki-redis
    restart: unless-stopped
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:latest
    container_name: llm-wiki-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: llm-wiki-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Docmesh123!"
    ports:
      - "19200:9200"
      - "19600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  postgres_data:
  minio_data:
  opensearch_data:
  go_mod_cache:
  go_build_cache:
