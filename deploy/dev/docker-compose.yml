services:
  app:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    container_name: docmesh-app
    working_dir: /workspace
    command: air -c .air.toml
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
      - opensearch
    environment:
      DOCMESH_ENVIRONMENT: development
      DOCMESH_LOG_LEVEL: debug
      DOCMESH_AUTO_MIGRATE: "true"
      DOCMESH_SERVER_HOST: 0.0.0.0
      DOCMESH_SERVER_PORT: 8234
      DOCMESH_CLI_BASE_URL: http://127.0.0.1:8234
      DOCMESH_CLI_TIMEOUT: 10s
      DOCMESH_POSTGRES_HOST: postgres
      DOCMESH_POSTGRES_PORT: 5432
      DOCMESH_POSTGRES_USER: docmesh
      DOCMESH_POSTGRES_PASSWORD: docmesh
      DOCMESH_POSTGRES_DATABASE: docmesh
      DOCMESH_POSTGRES_SSLMODE: disable
      DOCMESH_REDIS_ADDR: redis:6379
      DOCMESH_REDIS_PASSWORD: ""
      DOCMESH_REDIS_DB: 0
      DOCMESH_MINIO_ENDPOINT: minio:9000
      DOCMESH_MINIO_ACCESS_KEY: minioadmin
      DOCMESH_MINIO_SECRET_KEY: minioadmin
      DOCMESH_MINIO_BUCKET: docmesh
      DOCMESH_MINIO_USE_SSL: "false"
      DOCMESH_OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "8234:8234"
    volumes:
      - ../..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  postgres:
    image: postgres:17
    container_name: docmesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docmesh
      POSTGRES_USER: docmesh
      POSTGRES_PASSWORD: docmesh
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: docmesh-redis
    restart: unless-stopped
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:latest
    container_name: docmesh-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: docmesh-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Docmesh123!"
    ports:
      - "19200:9200"
      - "19600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  postgres_data:
  minio_data:
  opensearch_data:
  go_mod_cache:
  go_build_cache:
