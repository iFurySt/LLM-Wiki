services:
  app:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    container_name: llm-wiki-app
    working_dir: /workspace
    command: air -c .air.toml
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      LLM_WIKI_ENVIRONMENT: development
      LLM_WIKI_LOG_LEVEL: debug
      LLM_WIKI_AUTO_MIGRATE: "true"
      LLM_WIKI_SERVER_HOST: 0.0.0.0
      LLM_WIKI_SERVER_PORT: 8234
      LLM_WIKI_CLI_BASE_URL: http://127.0.0.1:8234
      LLM_WIKI_CLI_TIMEOUT: 10s
      LLM_WIKI_POSTGRES_HOST: postgres
      LLM_WIKI_POSTGRES_PORT: 5432
      LLM_WIKI_POSTGRES_USER: llmwiki
      LLM_WIKI_POSTGRES_PASSWORD: llmwiki
      LLM_WIKI_POSTGRES_DATABASE: llmwiki
      LLM_WIKI_POSTGRES_SSLMODE: disable
    ports:
      - "8234:8234"
    volumes:
      - ../..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  postgres:
    image: postgres:17
    container_name: llm-wiki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: llmwiki
      POSTGRES_USER: llmwiki
      POSTGRES_PASSWORD: llmwiki
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
