<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM-Wiki</title>
  <style>
    :root,
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0b0d12;
      --bg-soft: #11141c;
      --panel: rgba(18, 22, 30, 0.82);
      --panel-2: rgba(24, 30, 40, 0.86);
      --panel-3: rgba(31, 39, 53, 0.92);
      --text: #f3f6fb;
      --muted: #8d99ab;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --accent: #8bb8ff;
      --accent-soft: rgba(139, 184, 255, 0.16);
      --success: #78d998;
      --warning: #ffb86b;
      --danger: #ff8f8f;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f4f7fb;
      --bg-soft: #ecf1f8;
      --panel: #ffffff;
      --panel-2: #f8fbff;
      --panel-3: #edf3fb;
      --text: #1a2230;
      --muted: #5d6b80;
      --line: #d7e0ec;
      --line-strong: #c1cede;
      --accent: #1f6feb;
      --accent-soft: rgba(31, 111, 235, 0.10);
      --success: #1c8c53;
      --warning: #a56500;
      --danger: #c44646;
      --shadow: rgba(44, 63, 88, 0.10);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top center, rgba(139, 184, 255, 0.12), transparent 28%),
        radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.05), transparent 22%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .page {
      max-width: 1540px;
      margin: 0 auto;
      padding: 20px;
    }

    .surface {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 18px 48px var(--shadow);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 18px;
      align-items: center;
      padding: 14px 18px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(135deg, rgba(139, 184, 255, 0.24), rgba(255,255,255,0.06));
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 0.04em;
      flex: 0 0 auto;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .brand-copy {
      min-width: 0;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tabs,
    .theme-toggle,
    .filter-row,
    .meta-row,
    .doc-meta-row,
    .reader-actions,
    .install-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tab,
    .theme-toggle button,
    .filter-pill,
    .pill,
    .copy-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      padding: 8px 13px;
      transition: 120ms ease;
      cursor: pointer;
    }

    .tab.active,
    .theme-toggle button.active,
    .filter-pill.active,
    .copy-button {
      color: var(--text);
      border-color: rgba(108, 178, 255, 0.38);
      background: var(--accent-soft);
    }

    .tab:hover,
    .theme-toggle button:hover,
    .filter-pill:hover,
    .copy-button:hover {
      color: var(--text);
      border-color: var(--line-strong);
    }

    .flash {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
    }

    .flash.success { color: var(--success); }

    .shell {
      display: grid;
      grid-template-columns: 286px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 16px;
      overflow: hidden;
    }

    .sidebar-head,
    .reader-head,
    .section-head,
    .install-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-head h2,
    .reader-title,
    .section-title,
    .install-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
    }

    .sidebar-head p,
    .reader-subtitle,
    .section-subtitle,
    .install-subtitle,
    .doc-subtitle,
    .revision-note,
    .copy-feedback,
    .install-copy,
    .empty {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .sidebar-body,
    .reader-body,
    .install-body {
      padding: 16px;
    }

    .sidebar-head p {
      margin-bottom: 0;
    }

    .tree-search {
      margin-top: 12px;
      position: relative;
    }

    .tree-search input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 0 12px 0 36px;
      outline: none;
    }

    .tree-search input::placeholder {
      color: var(--muted);
    }

    .tree-search::before {
      content: "⌕";
      position: absolute;
      left: 12px;
      top: 9px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
    }

    .mui-tree-shell {
      margin-top: 8px;
      min-height: 120px;
    }

    .mui-tree-empty {
      padding: 8px 8px 8px 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .mui-tree-item-title {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stats {
      display: none;
    }

    .stat {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-2);
    }

    .stat-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }

    .tree {
      margin-top: 8px;
      display: grid;
      gap: 0;
    }

    .tree-root {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 5px 8px;
      border-radius: 8px;
      background: rgba(108, 178, 255, 0.16);
      color: var(--text);
    }

    .tree-root::before {
      content: "▾";
      color: var(--accent);
      font-size: 13px;
      width: 14px;
      text-align: center;
      flex: 0 0 auto;
    }

    .tree-root::after {
      content: "";
      width: 13px;
      height: 10px;
      border: 1px solid rgba(108, 178, 255, 0.6);
      border-top-width: 4px;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .tree-root-title {
      min-width: 0;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    details.tree-group {
      border-radius: 8px;
      border: 0;
      background: transparent;
      overflow: hidden;
    }

    details.tree-group summary {
      list-style: none;
    }

    details.tree-group summary::-webkit-details-marker {
      display: none;
    }

    .tree-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 30px;
      padding: 5px 8px;
      cursor: pointer;
      border-radius: 6px;
    }

    .tree-row:hover,
    details.tree-group[open] .tree-row {
      background: rgba(255, 255, 255, 0.035);
    }

    .tree-folder {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .tree-folder::before {
      content: "▸";
      color: var(--muted);
      font-size: 13px;
      flex: 0 0 auto;
      width: 14px;
      text-align: center;
    }

    .tree-folder::after {
      content: "";
      width: 12px;
      height: 9px;
      border: 1px solid var(--line-strong);
      border-top-width: 4px;
      border-radius: 2px;
      background: transparent;
      flex: 0 0 auto;
    }

    details.tree-group[open] .tree-folder::before {
      content: "▾";
      color: var(--accent);
    }

    .tree-folder-title,
    .tree-file-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 500;
    }

    .tree-docs {
      display: grid;
      gap: 0;
      padding: 0 0 2px 0;
    }

    .tree-link {
      display: flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 8px 4px 42px;
      border-radius: 6px;
      color: var(--muted);
      position: relative;
      gap: 8px;
    }

    .tree-link::before {
      content: "";
      position: absolute;
      left: 25px;
      top: 7px;
      width: 12px;
      height: 14px;
      border: 1px solid var(--line-strong);
      border-radius: 2px;
      background:
        linear-gradient(var(--line-strong), var(--line-strong)) top left / 100% 3px no-repeat,
        transparent;
    }

    .tree-link:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .tree-link.selected {
      background: rgba(108, 178, 255, 0.16);
      color: var(--text);
    }

    .tree-link.selected::before {
      border-color: var(--accent);
      background:
        linear-gradient(var(--accent), var(--accent)) top left / 100% 3px no-repeat,
        transparent;
    }

    .tree-meta-right,
    .doc-meta-row {
      justify-content: flex-end;
    }

    .pill {
      font-size: 11px;
      padding: 4px 8px;
      cursor: default;
    }

    .pill.active {
      color: var(--accent);
      border-color: rgba(108, 178, 255, 0.28);
      background: var(--accent-soft);
    }

    .pill.archived {
      color: var(--danger);
      background: rgba(255, 143, 143, 0.10);
      border-color: rgba(255, 143, 143, 0.24);
    }

    .main {
      display: grid;
      gap: 14px;
    }

    .ns-bar,
    .reader,
    .section,
    .install-grid > article {
      overflow: hidden;
    }

    .ns-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 16px 18px;
      align-items: center;
    }

    .ns-copy {
      min-width: 0;
    }

    .ns-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .ns-note {
      margin-top: 4px;
      color: var(--text);
      font-size: 28px;
      font-weight: 600;
      line-height: 1.16;
      max-width: 16ch;
    }

    .reader-header-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .doc-title {
      margin: 0;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    .doc-subtitle {
      margin-top: 8px;
      font-size: 14px;
    }

    .markdown-wrap {
      margin-top: 18px;
      padding: 22px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      overflow: auto;
    }

    .markdown-body {
      max-width: 84ch;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
    }

    .markdown-body > :first-child {
      margin-top: 0;
    }

    .markdown-body > :last-child {
      margin-bottom: 0;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      margin: 1.2em 0 0.55em;
      line-height: 1.25;
    }

    .markdown-body code {
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background: rgba(0, 0, 0, 0.16);
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 0.92em;
    }

    .markdown-body pre {
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: #0d1117;
      overflow: auto;
    }

    .revision-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .revision-card {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
    }

    .revision-title {
      font-weight: 700;
      font-size: 14px;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border-radius: 12px;
      border: 1px dashed var(--line-strong);
      background: var(--panel-2);
    }

    .install-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .install-grid > article {
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 16px 40px var(--shadow);
    }

    .install-body {
      display: grid;
      gap: 14px;
    }

    .copy-block {
      display: grid;
      gap: 8px;
    }

    .copy-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .install-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .code-block {
      margin: 0;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0d1117;
      color: #d2e5ff;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    #ui-content {
      transition: opacity 120ms ease;
    }

    #ui-content.is-loading {
      opacity: 0.82;
    }

    @media (max-width: 1180px) {
      .shell,
      .install-grid,
      .reader-header-grid,
      .ns-bar {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar surface">
      <div class="brand">
        <div class="brand-mark">LW</div>
        <div class="brand-copy">
          <div class="brand-title">LLM-Wiki</div>
          <div class="brand-subtitle">Service-first knowledge system for documents, revisions, and agents.</div>
        </div>
      </div>

      <nav class="tabs" aria-label="Top tabs">
        <a class="tab {{ if eq .CurrentPage "wiki" }}active{{ end }}" href="/ui" data-ui-nav data-ui-tab="wiki">Knowledge</a>
        <a class="tab {{ if eq .CurrentPage "install" }}active{{ end }}" href="/ui/install" data-ui-nav data-ui-tab="install">Install</a>
      </nav>

      <div class="theme-toggle" aria-label="Theme toggle">
        <button type="button" data-theme-button="dark">Dark</button>
        <button type="button" data-theme-button="light">Light</button>
      </div>
    </header>

    {{ if .Flash }}
    <div class="flash {{ .Flash.Kind }}">{{ .Flash.Message }}</div>
    {{ end }}

    <div id="ui-content">
      {{ if eq .CurrentPage "wiki" }}
      {{ template "ui_wiki_content.html" . }}
      {{ else }}
      {{ template "ui_install_content.html" . }}
      {{ end }}
    </div>
  </div>

  <script src="/ui/assets/llm-wiki-tree.js" defer></script>
  <script>
    (function() {
      var root = document.documentElement;
      var storageKey = "llm-wiki-theme";
      var buttons = document.querySelectorAll("[data-theme-button]");
      var contentRoot = document.getElementById("ui-content");

      function applyTheme(theme) {
        root.setAttribute("data-theme", theme);
        buttons.forEach(function(button) {
          button.classList.toggle("active", button.getAttribute("data-theme-button") === theme);
        });
      }

      function pageForLocation(location) {
        return location.pathname === "/ui/install" ? "install" : "wiki";
      }

      function fragmentURL(targetURL) {
        var url = new URL(targetURL, window.location.origin);
        if (url.pathname === "/ui") {
          return "/ui/fragment/wiki" + url.search;
        }
        if (url.pathname === "/ui/install") {
          return "/ui/fragment/install" + url.search;
        }
        return "";
      }

      function updateActiveTabs(page) {
        document.querySelectorAll("[data-ui-tab]").forEach(function(tab) {
          tab.classList.toggle("active", tab.getAttribute("data-ui-tab") === page);
        });
      }

      function mountTreeFromDOM() {
        if (window.LLMWikiTree && typeof window.LLMWikiTree.mountFromDOM === "function") {
          window.LLMWikiTree.mountFromDOM();
        }
      }

      function setLoading(loading) {
        if (!contentRoot) {
          return;
        }
        contentRoot.classList.toggle("is-loading", loading);
        contentRoot.setAttribute("aria-busy", loading ? "true" : "false");
      }

      function replaceContent(html, targetURL, pushHistory) {
        if (!contentRoot) {
          window.location.assign(targetURL);
          return;
        }
        contentRoot.innerHTML = html;
        updateActiveTabs(pageForLocation(new URL(targetURL, window.location.origin)));
        mountTreeFromDOM();
        if (pushHistory) {
          window.history.pushState({ url: targetURL }, "", targetURL);
        }
      }

      function navigate(targetURL, options) {
        var settings = options || {};
        var fragment = fragmentURL(targetURL);
        if (!fragment || !contentRoot) {
          window.location.assign(targetURL);
          return Promise.resolve();
        }
        setLoading(true);
        return fetch(fragment, {
          headers: {
            "X-Requested-With": "fetch"
          }
        }).then(function(response) {
          if (!response.ok) {
            throw new Error("fragment request failed");
          }
          return response.text();
        }).then(function(html) {
          replaceContent(html, targetURL, settings.pushHistory !== false);
        }).catch(function() {
          window.location.assign(targetURL);
        }).finally(function() {
          setLoading(false);
        });
      }

      window.LLMWikiUI = {
        navigate: navigate
      };

      var saved = localStorage.getItem(storageKey);
      applyTheme(saved === "light" || saved === "dark" ? saved : "dark");

      buttons.forEach(function(button) {
        button.addEventListener("click", function() {
          var theme = button.getAttribute("data-theme-button");
          localStorage.setItem(storageKey, theme);
          applyTheme(theme);
        });
      });

      document.addEventListener("click", function(event) {
        if (!(event.target instanceof Element)) {
          return;
        }
        var navLink = event.target.closest("[data-ui-nav]");
        if (navLink && navLink.getAttribute("href")) {
          event.preventDefault();
          navigate(navLink.getAttribute("href"));
          return;
        }

        var button = event.target.closest("[data-copy-target]");
        if (!button) {
          return;
        }
        var targetId = button.getAttribute("data-copy-target");
        var target = document.getElementById(targetId);
        if (!target) {
          return;
        }
        navigator.clipboard.writeText(target.textContent).then(function() {
          var card = button.closest("article");
          var feedback = card ? card.querySelector("[data-copy-feedback]") : null;
          if (feedback) {
            feedback.textContent = "Copied.";
          }
        }).catch(function() {
          var card = button.closest("article");
          var feedback = card ? card.querySelector("[data-copy-feedback]") : null;
          if (feedback) {
            feedback.textContent = "Copy failed.";
          }
        });
      });

      window.addEventListener("popstate", function() {
        navigate(window.location.pathname + window.location.search, { pushHistory: false });
      });

      mountTreeFromDOM();
    })();
  </script>
</body>
</html>
