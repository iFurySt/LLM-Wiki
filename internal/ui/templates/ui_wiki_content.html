<div class="shell wiki-shell">
  <aside class="sidebar surface">
    <div class="sidebar-head sidebar-stack">
      <div id="mui-ns-switch-root" class="workspace-switch-shell">
        <div class="mui-tree-empty">Loading spaces...</div>
      </div>
      <script id="mui-ns-switch-state" type="application/json">{{ .NSSwitchStateJSON }}</script>

      <div class="tree-search">
        <input type="search" placeholder="Search documents" data-tree-search />
      </div>
    </div>

    <div class="sidebar-body">
      <div id="mui-tree-root" class="mui-tree-shell">
        <div class="mui-tree-empty">Loading files...</div>
      </div>
      <script id="mui-tree-state" type="application/json">{{ .TreeStateJSON }}</script>
    </div>
  </aside>

  {{ template "ui_reader_content.html" . }}
</div>
