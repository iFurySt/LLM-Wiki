root = "."
tmp_dir = ".air"

[build]
cmd = "chmod +x ./scripts/release/package-install.sh ./install/install-cli.sh && ./scripts/release/package-install.sh && go build -o ./.air/llm-wiki-server ./cmd/server"
bin = "./.air/llm-wiki-server"
delay = 500
exclude_dir = ["dist/install/releases", "dist/install/skills", ".git", ".air", "tmp", "vendor", "node_modules"]
exclude_regex = ["_test\\.go"]
include_ext = ["go", "html", "tmpl", "tpl", "css", "js", "md", "sh", "yml", "yaml"]
kill_delay = "500ms"
send_interrupt = true
stop_on_error = true

[log]
time = true
